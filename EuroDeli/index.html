    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.12 });
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    /* Determine which day is "today" + open status (America/New_York-friendly fallback uses local time) */
    function useOpenStatus(hours) {
      const dayOrderEN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const now = new Date();
      const dayName = dayOrderEN[now.getDay()];
      // Match against either EN or PL list by index since both lists are in Mon..Sun order
      const idx = (now.getDay() + 6) % 7; // Mon=0..Sun=6
      const todayRow = hours[idx];
      let isOpen = false;
      if (todayRow && todayRow[1] && !/closed|zamkn/i.test(todayRow[1])) {
        const m = todayRow[1].match(/(\d{1,2}):(\d{2})\s*(AM|PM)?\s*[–\-]\s*(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
        if (m) {
          const to24 = (h, mer) => {
            h = parseInt(h, 10);
            if (!mer) return h;
            const M = mer.toUpperCase();
            if (M === 'PM' && h !== 12) h += 12;
            if (M === 'AM' && h === 12) h = 0;
            return h;
          };
          const sH = to24(m[1], m[3]); const sMin = parseInt(m[2],10);
          const eH = to24(m[4], m[6]); const eMin = parseInt(m[5],10);
          const cur = now.getHours()*60 + now.getMinutes();
          const start = sH*60 + sMin; const end = eH*60 + eMin;
          isOpen = cur >= start && cur <= end;
        }
      }
      return { isOpen, todayIdx: idx, dayName };
    }

            </div>
          )}
        </section>
      );
    }

    /* ============================ HOURS TABLE ============================ */
    function HoursTable({ lang }) {
      const C = t[lang].contact;
      const { isOpen, todayIdx } = useOpenStatus(C.hours);
      return (
        <div className="glass-strong rounded-3xl p-6 md:p-7 shadow-glass">
          <div className="flex items-center justify-between mb-4">
            <h4 className="font-display text-xl text-brand-navy font-bold flex items-center gap-2">
              <Icon.Clock className="w-5 h-5 text-brand-red" />
              {C.hoursTitle}
            </h4>
            <span className={`inline-flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-full ${isOpen ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
              <span className={`w-2 h-2 rounded-full ${isOpen ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></span>
              {isOpen ? C.openNow : (lang === 'pl' ? 'Zamknięte' : 'Closed')}
            </span>
          </div>
          <ul className="divide-y divide-brand-navy/10">
            {C.hours.map(([day, time], i) => {
              const closed = /closed|zamkn/i.test(time);
              const today = i === todayIdx;
              return (
                <li key={day} className={`flex items-center justify-between py-2.5 text-sm ${today ? 'font-bold text-brand-red' : closed ? 'text-brand-navy/50' : 'text-brand-navy'}`}>
                  <span>{day}{today && <span className="ml-2 text-[10px] uppercase tracking-wider bg-brand-red text-white px-2 py-0.5 rounded-full">{lang === 'pl' ? 'Dziś' : 'Today'}</span>}</span>
                  <span>{time}</span>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    /* ============================ CONTACT ============================ */
    function Contact({ lang }) {
      const L = t[lang].contact;
      const [sent, setSent] = useState(false);
      const submit = (e) => { e.preventDefault(); setSent(true); setTimeout(() => setSent(false), 5000); e.target.reset(); };

      return (
        <section id="contact" className="relative py-24 md:py-32 gradient-warm overflow-hidden">
          <div className="container mx-auto px-5 md:px-10">
            <SectionHeader tag={L.tag} title={L.title} subtitle={L.subtitle} />

            <div className="mt-14 grid lg:grid-cols-12 gap-6">
              {/* Map */}
              <div className="lg:col-span-7 reveal rounded-3xl overflow-hidden shadow-soft glass-strong p-2">
                <div className="rounded-2xl overflow-hidden aspect-[4/3] lg:aspect-auto lg:h-full min-h-[520px]">
                  <iframe
                    title="EuroDeli location"
                    src="https://www.google.com/maps?q=1879+W+Hillsboro+Blvd,+Deerfield+Beach,+FL+33442&output=embed"
                    width="100%" height="100%" style={{border:0}}
                    loading="lazy" referrerPolicy="no-referrer-when-downgrade"
                    allowFullScreen></iframe>
                </div>
              </div>

              {/* Right: hours + info + form */}
              <div className="lg:col-span-5 space-y-5">
                <div className="reveal"><HoursTable lang={lang} /></div>

                <div className="reveal glass-strong rounded-3xl p-6 md:p-7 shadow-glass">
                  <h3 className="font-display text-2xl text-brand-navy font-bold">EuroDeli</h3>
                  <div className="mt-5 space-y-4 text-brand-navy/85">
                    <div className="flex items-start gap-3">
                      <Icon.Pin className="w-5 h-5 mt-0.5 text-brand-red flex-shrink-0" />
                      <span className="text-sm">{L.address}</span>
                    </div>
                    <a href="tel:+19544250200" className="flex items-center gap-3 hover:text-brand-red transition">
                      <Icon.Phone className="w-5 h-5 text-brand-red" />
                      <span className="text-sm font-semibold">{L.phone}</span>
                    </a>
                    <a href="mailto:eurodeli0200@yahoo.com" className="flex items-center gap-3 hover:text-brand-red transition break-all">
                      <Icon.Mail className="w-5 h-5 text-brand-red flex-shrink-0" />
                      <span className="text-sm">{L.email}</span>
                    </a>
                  </div>
                  <div className="mt-5 flex gap-2">
                    <a aria-label="Facebook" href={SOCIAL.fb} target="_blank" rel="noreferrer"
                       className="w-10 h-10 rounded-full bg-brand-navy text-white flex items-center justify-center hover:bg-brand-red transition">
                      <Icon.FB className="w-4 h-4" />
                    </a>
                    <a aria-label="Instagram" href={SOCIAL.ig} target="_blank" rel="noreferrer"
                       className="w-10 h-10 rounded-full bg-brand-navy text-white flex items-center justify-center hover:bg-brand-red transition">
                      <Icon.IG className="w-4 h-4" />
                    </a>
                  </div>
                </div>

                <form onSubmit={submit} className="reveal glass-strong rounded-3xl p-6 md:p-7 shadow-glass space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <input required type="text" placeholder={L.form.name}
                           className="col-span-2 sm:col-span-1 w-full px-4 py-3 rounded-xl bg-white/70 border border-white/80 focus:border-brand-red focus:outline-none text-sm text-brand-navy placeholder-brand-navy/50" />
                    <input required type="email" placeholder={L.form.email}
                           className="col-span-2 sm:col-span-1 w-full px-4 py-3 rounded-xl bg-white/70 border border-white/80 focus:border-brand-red focus:outline-none text-sm text-brand-navy placeholder-brand-navy/50" />
                  </div>
                  <input required type="text" placeholder={L.form.subject}
                         className="w-full px-4 py-3 rounded-xl bg-white/70 border border-white/80 focus:border-brand-red focus:outline-none text-sm text-brand-navy placeholder-brand-navy/50" />
                  <textarea required rows="4" placeholder={L.form.message}
                            className="w-full px-4 py-3 rounded-xl bg-white/70 border border-white/80 focus:border-brand-red focus:outline-none text-sm text-brand-navy placeholder-brand-navy/50 resize-none"></textarea>
                  <button type="submit"
                          className="w-full inline-flex items-center justify-center gap-2 px-5 py-3.5 rounded-xl bg-brand-red text-white font-semibold shadow-glass hover:bg-brand-redDk transition">
                    {L.form.send} <Icon.Arrow className="w-4 h-4" />
                  </button>
                  {sent && (
                    <div className="text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2">
                      {L.form.sent}
                    </div>
                  )}
                </form>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ============================ FOOTER ============================ */
    function Footer({ lang }) {
      const L = t[lang].footer;
      const N = t[lang].nav;
      return (
        <footer className="relative polish-motif-dark text-white pt-16 pb-8 overflow-hidden">
          <div className="relative container mx-auto px-5 md:px-10">
            {/* Payment cards strip with logos */}
            <div className="glass-dark rounded-3xl p-6 md:p-7 mb-12">
              <div className="flex flex-col lg:flex-row items-center justify-between gap-5">
                <div className="flex items-center gap-3 text-center lg:text-left">
                  <div className="w-12 h-12 rounded-2xl bg-brand-red flex items-center justify-center flex-shrink-0 shadow-glass">
                    <svg viewBox="0 0 24 24" className="w-6 h-6 text-white" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 11h20"/>
                    </svg>
                  </div>
                  <span className="text-sm md:text-base font-semibold tracking-wide">{L.cards}</span>
                </div>
                <div className="flex items-center gap-2.5 md:gap-3 flex-wrap justify-center">
                  {PAYMENT_LOGOS.map((p) => (
                    <div key={p.name}
                         title={p.name}
                         className="bg-white rounded-xl h-12 md:h-14 w-[72px] md:w-[88px] px-3 flex items-center justify-center shadow-[0_4px_16px_rgba(0,0,0,0.12)] hover:shadow-[0_6px_22px_rgba(0,0,0,0.18)] hover:-translate-y-0.5 transition-all duration-200">
                      <img src={p.src} alt={p.name} className={`${p.h} w-auto object-contain`} />
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="grid md:grid-cols-4 gap-10">
              <div className="md:col-span-2">
                <div className="flex items-center gap-3">
                  <img src="logo_transparent.png" alt="EuroDeli" className="h-14 w-auto" />
                  <span className="font-display text-3xl font-bold">EuroDeli</span>
                </div>
                <p className="mt-4 text-white/70 max-w-md leading-relaxed text-sm">{L.tagline}</p>
                <div className="mt-5 flex gap-2">
                  <a aria-label="Facebook" href={SOCIAL.fb} target="_blank" rel="noreferrer"
                     className="w-11 h-11 rounded-full glass-dark flex items-center justify-center hover:bg-brand-red transition">
                    <Icon.FB className="w-5 h-5 text-white" />
                  </a>
                  <a aria-label="Instagram" href={SOCIAL.ig} target="_blank" rel="noreferrer"
                     className="w-11 h-11 rounded-full glass-dark flex items-center justify-center hover:bg-brand-red transition">
                    <Icon.IG className="w-5 h-5 text-white" />
                  </a>
                </div>
              </div>

              <div>
                <h4 className="font-display text-lg mb-4 font-bold">{L.navLabel}</h4>
                <ul className="space-y-2 text-sm text-white/75">
                  {[['#about', N.about],['#services', N.services],['#brands', N.brands],['#gallery', N.gallery],['#contact', N.contact]].map(([h,l]) => (
                    <li key={h}><a href={h} className="hover:text-brand-red transition">{l}</a></li>
                  ))}
                </ul>
              </div>

              <div>
                <h4 className="font-display text-lg mb-4 font-bold">{L.contactLabel}</h4>
                <ul className="space-y-2 text-sm text-white/75">
                  <li>1879 W Hillsboro Blvd</li>
                  <li>Deerfield Beach, FL 33442</li>
                  <li><a href="tel:+19544250200" className="hover:text-brand-red transition">+1 954-425-0200</a></li>
                  <li className="break-all"><a href="mailto:eurodeli0200@yahoo.com" className="hover:text-brand-red transition">eurodeli0200@yahoo.com</a></li>
                </ul>
              </div>
            </div>

            <div className="mt-12 pt-6 border-t border-white/10 flex flex-col md:flex-row items-center justify-between gap-3 text-xs text-white/50">
              <span>© {new Date().getFullYear()} EuroDeli. {L.rights}</span>
              <span>Designed with ♥ in South Florida</span>
            </div>
          </div>
        </footer>
      );
    }

    /* ============================ APP ============================ */
    function App() {
      const [lang, setLang] = useState(() => {
        const saved = localStorage.getItem('eurodeli_lang');
        if (saved) return saved;
        return (navigator.language || 'en').toLowerCase().startsWith('pl') ? 'pl' : 'en';
      });

      useEffect(() => { localStorage.setItem('eurodeli_lang', lang); document.documentElement.lang = lang; }, [lang]);
      useReveal();

      const onNavClick = (e, id) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 90, behavior: 'smooth' });
      };

      return (
        <>
          <Navbar lang={lang} setLang={setLang} onNavClick={onNavClick} />
          <main>
            <Hero lang={lang} onNavClick={onNavClick} />
            <About lang={lang} />
            <Services lang={lang} />
            <Brands lang={lang} />
            <Gallery lang={lang} />
            <Contact lang={lang} />
          </main>
          <Footer lang={lang} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
